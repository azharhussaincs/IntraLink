services:
  postgres:
    image: postgres:15-alpine
    container_name: messenger_db
    restart: always
    environment:
      POSTGRES_USER: messenger_user
      POSTGRES_PASSWORD: messenger_password
      POSTGRES_DB: messenger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: messenger_redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: messenger_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    container_name: messenger_backend
    restart: always
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      - PORT=3001
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=messenger_user
      - DATABASE_PASSWORD=messenger_password
      - DATABASE_NAME=messenger_db
      - DATABASE_URL=postgres://messenger_user:messenger_password@postgres:5432/messenger_db
      - JWT_SECRET=production_secret_key_change_me
      - ENCRYPTION_KEY=12345678901234567890123456789012
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_password
      - REDIS_URL=redis://redis:6379
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: messenger_frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
